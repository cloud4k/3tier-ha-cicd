name: Deploy Backend Dev EC2

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy-dev-ec2.yml"
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infrastructure/environments/dev-ec2
        run: terraform init -reconfigure

      - name: Get Terraform outputs
        working-directory: infrastructure/environments/dev-ec2
        run: |
          ARTIFACT_BUCKET_VALUE=$(terraform output -raw artifact_bucket_name)
          ALB_DNS_NAME_VALUE=$(terraform output -raw alb_dns_name)

          echo "ARTIFACT_BUCKET=$ARTIFACT_BUCKET_VALUE" >> $GITHUB_ENV
          echo "ALB_DNS_NAME=$ALB_DNS_NAME_VALUE" >> $GITHUB_ENV

      - name: Debug deployment variables
        run: |
          echo "ARTIFACT_BUCKET=$ARTIFACT_BUCKET"
          echo "ALB_DNS_NAME=$ALB_DNS_NAME"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Build backend WAR
        working-directory: backend
        run: mvn clean package

      - name: Upload backend WAR to S3
        run: |
          aws s3 cp backend/target/backend.war s3://$ARTIFACT_BUCKET/backend/backend.war

      - name: Get current backend target group instances
        run: |
          BACKEND_TG_ARN=$(aws elbv2 describe-target-groups \
            --names backend-tg \
            --query "TargetGroups[0].TargetGroupArn" \
            --output text)

          BACKEND_INSTANCES=$(aws elbv2 describe-target-health \
            --target-group-arn $BACKEND_TG_ARN \
            --query "TargetHealthDescriptions[?TargetHealth.State=='healthy'].Target.Id" \
            --output text)

          if [ -z "$BACKEND_INSTANCES" ]; then
            echo "No healthy backend target group instances found"
            exit 1
          fi

          echo "BACKEND_INSTANCES=$BACKEND_INSTANCES" >> $GITHUB_ENV
          echo "Backend target instances: $BACKEND_INSTANCES"

      - name: Deploy backend WAR to Tomcat
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids $BACKEND_INSTANCES \
            --parameters 'commands=[
              "sudo systemctl stop tomcat",
              "sudo rm -rf /opt/tomcat11/webapps/ROOT /opt/tomcat11/webapps/ROOT.war",
              "aws s3 cp s3://'"$ARTIFACT_BUCKET"'/backend/backend.war /tmp/ROOT.war",
              "sudo mv /tmp/ROOT.war /opt/tomcat11/webapps/ROOT.war",
              "sudo chown tomcat:tomcat /opt/tomcat11/webapps/ROOT.war",
              "sudo systemctl start tomcat",
              "sleep 20",
              "curl http://localhost:8080/students"
            ]' \
            --comment "Deploy backend WAR as ROOT" \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV
          echo "Backend deployment command ID: $COMMAND_ID"

      - name: Check backend deployment command
        run: |
          sleep 30

          aws ssm list-command-invocations \
            --command-id $COMMAND_ID \
            --details \
            --query "CommandInvocations[*].[InstanceId,Status,CommandPlugins[0].Output,CommandPlugins[0].StandardErrorContent]" \
            --output table

      - name: Verify backend through ALB
        run: |
          curl http://$ALB_DNS_NAME/students