name: Deploy App Dev EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      ARTIFACT_BUCKET: 3tier-ha-cicd-dev-ec2-war-artifacts
      BACKEND_ASG_NAME: 3tier-ha-cicd-dev-ec2-backend-asg
      FRONTEND_ASG_NAME: 3tier-ha-cicd-dev-ec2-frontend-asg
      ALB_DNS_NAME: app-3tier-ha-cicd-dev-ec2-alb-1213425633.us-east-1.elb.amazonaws.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Build backend WAR
        working-directory: backend
        run: mvn clean package

      - name: Build frontend WAR
        working-directory: frontend
        run: mvn clean package

      - name: Upload WAR artifacts to S3
        run: |
          aws s3 cp backend/target/backend.war s3://$ARTIFACT_BUCKET/backend/backend.war
          aws s3 cp frontend/target/frontend.war s3://$ARTIFACT_BUCKET/frontend/frontend.war

      - name: Get current backend instances
        run: |
          BACKEND_INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names $BACKEND_ASG_NAME \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService' && HealthStatus=='Healthy'].InstanceId" \
            --output text)

          echo "BACKEND_INSTANCES=$BACKEND_INSTANCES" >> $GITHUB_ENV
          echo "Backend instances: $BACKEND_INSTANCES"

      - name: Get current frontend instances
        run: |
          FRONTEND_INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names $FRONTEND_ASG_NAME \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService' && HealthStatus=='Healthy'].InstanceId" \
            --output text)

          echo "FRONTEND_INSTANCES=$FRONTEND_INSTANCES" >> $GITHUB_ENV
          echo "Frontend instances: $FRONTEND_INSTANCES"

      - name: Deploy backend WAR to Tomcat
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids $BACKEND_INSTANCES \
            --parameters 'commands=[
              "sudo systemctl stop tomcat",
              "sudo rm -rf /opt/tomcat11/webapps/ROOT /opt/tomcat11/webapps/ROOT.war",
              "aws s3 cp s3://3tier-ha-cicd-dev-ec2-war-artifacts/backend/backend.war /tmp/ROOT.war",
              "sudo mv /tmp/ROOT.war /opt/tomcat11/webapps/ROOT.war",
              "sudo chown tomcat:tomcat /opt/tomcat11/webapps/ROOT.war",
              "sudo systemctl start tomcat",
              "sleep 20",
              "curl http://localhost:8080/students"
            ]' \
            --comment "Deploy backend WAR as ROOT" \
            --query "Command.CommandId" \
            --output text)

          echo "Backend command ID: $COMMAND_ID"
          sleep 30

          aws ssm list-command-invocations \
            --command-id $COMMAND_ID \
            --details \
            --query "CommandInvocations[*].[InstanceId,Status]" \
            --output table

      - name: Deploy frontend WAR to Tomcat
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids $FRONTEND_INSTANCES \
            --parameters 'commands=[
              "sudo systemctl stop tomcat",
              "sudo rm -rf /opt/tomcat11/webapps/ROOT /opt/tomcat11/webapps/ROOT.war /opt/tomcat11/webapps/frontend /opt/tomcat11/webapps/frontend.war",
              "aws s3 cp s3://3tier-ha-cicd-dev-ec2-war-artifacts/frontend/frontend.war /tmp/ROOT.war",
              "sudo mv /tmp/ROOT.war /opt/tomcat11/webapps/ROOT.war",
              "sudo chown tomcat:tomcat /opt/tomcat11/webapps/ROOT.war",
              "sudo systemctl start tomcat",
              "sleep 20",
              "curl -I http://localhost:8080/"
            ]' \
            --comment "Deploy frontend WAR as ROOT" \
            --query "Command.CommandId" \
            --output text)

          echo "Frontend command ID: $COMMAND_ID"
          sleep 30

          aws ssm list-command-invocations \
            --command-id $COMMAND_ID \
            --details \
            --query "CommandInvocations[*].[InstanceId,Status]" \
            --output table

      - name: Verify backend through ALB
        run: |
          curl http://$ALB_DNS_NAME/students

      - name: Verify frontend through ALB
        run: |
          curl -I http://$ALB_DNS_NAME/